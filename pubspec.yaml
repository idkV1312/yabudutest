name: yabudu
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  mask_text_input_formatter: ^2.0.0
  webview_flutter: ^4.4.2
  flutter:
    sdk: flutter
  flutter_web_auth_2: ^4.0.0

  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  crypto: ^3.0.7
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
          weight: 400
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700

    - family: FindSansPro
      fonts:
        - asset: assets/fonts/FindSansPro-Regular.ttf
          weight: 400
        - asset: assets/fonts/FindSansPro-Medium.ttf
          weight: 500
        - asset: assets/fonts/FindSansPro-Bold.ttf
          weight: 700